<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="bg" cx="50%" cy="48%" r="72%">
      <stop offset="0%"   stop-color="#1a2b3f"/>
      <stop offset="100%" stop-color="#07080f"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#4a8ab4" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#07080f" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="22"/>
    </filter>
  </defs>

  <!-- Fond -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Particules de givre (cercles) -->
  <circle cx="180"  cy="120" r="1.4" fill="#8bb8d4" opacity="0.5"/>
  <circle cx="320"  cy="80"  r="0.9" fill="#8bb8d4" opacity="0.4"/>
  <circle cx="900"  cy="100" r="1.6" fill="#d8eaf5" opacity="0.35"/>
  <circle cx="1050" cy="200" r="1.1" fill="#8bb8d4" opacity="0.45"/>
  <circle cx="140"  cy="480" r="1.3" fill="#4a8ab4" opacity="0.4"/>
  <circle cx="1080" cy="520" r="0.8" fill="#8bb8d4" opacity="0.5"/>
  <circle cx="580"  cy="60"  r="1.0" fill="#d8eaf5" opacity="0.3"/>
  <circle cx="760"  cy="570" r="1.5" fill="#8bb8d4" opacity="0.4"/>
  <circle cx="420"  cy="540" r="0.7" fill="#4a8ab4" opacity="0.35"/>

  <!-- Ligne décorative fine en haut -->
  <line x1="280" y1="178" x2="920" y2="178" stroke="#4a8ab4" stroke-width="0.6" opacity="0.4"/>

  <!-- Sigle GIVRÉ — Cormorant simulé via serif générique SVG -->
  <text
    x="600" y="340"
    text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="108"
    font-weight="300"
    fill="#f2f2ed"
    letter-spacing="36"
    opacity="0.97"
  >GIVRÉ</text>

  <!-- Sous-titre -->
  <text
    x="600" y="410"
    text-anchor="middle"
    font-family="Arial, Helvetica, sans-serif"
    font-size="15"
    font-weight="300"
    fill="#8bb8d4"
    letter-spacing="8"
    opacity="0.85"
  >HAUTE PARFUMERIE · PARIS</text>

  <!-- Ligne décorative fine en bas -->
  <line x1="440" y1="448" x2="760" y2="448" stroke="#4a8ab4" stroke-width="0.6" opacity="0.4"/>
</svg>
